name: Build KSO Download Turbo Ultra V1
on:
  push:
    tags: [ 'v*' ]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    - run: pip install -r requirements.txt pyinstaller
    - run: python generate_assets.py
    - run: pyinstaller --onefile --noconsole --add-data "lang.json;." --add-data "config.json;." --name "KSO_Download_Turbo_Ultra_V1" main.py
    - run: choco install innosetup -y
    - run: ISCC.exe installer.iss
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/KSO_Download_Turbo_Ultra_V1.exe
          output/KSO_Download_Turbo_Ultra_V1_Setup.exe
